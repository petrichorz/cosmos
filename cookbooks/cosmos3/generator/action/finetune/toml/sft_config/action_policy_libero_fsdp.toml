# LIBERO-10 action-policy SFT run config for the `action_policy_libero_nano`
# experiment. Train on libero_10 alone with NATIVE FSDP on a single 8-GPU node
# (shard 8 x replicate 1, global batch 2048 via grad_accum 2). This is the
# single-node counterpart to action_policy_libero_repro.toml (HSDP 2x8): same
# gbs/lr/max_iter, just FSDP instead of HSDP. It matches the framework's
# canonical topology (max_samples 128 x DP8 x grad_accum 2 = 2048); the HSDP
# repro reaches the same gbs with 16 ranks x grad_accum 1, while this one uses
# 8 ranks x grad_accum 2. Native FSDP is preferred on a single node - no
# cross-node all-gather and lower per-rank weight memory than HSDP.
# Env: LIBERO_ROOT, BASE_CHECKPOINT_PATH, WAN_VAE_PATH, IMAGINAIRE_OUTPUT_ROOT.
# See docs/action_policy_libero_sft.md.

[job]
task         = "vfm"
experiment   = "action_policy_libero_nano"
project      = "cosmos3_action_libero"
group        = "action_sft"
name         = "action_policy_libero_fsdp"
wandb_mode   = "online"

[model]
precision = "bfloat16"
max_num_tokens_after_packing = 74000

[model.parallelism]
data_parallel_shard_degree     = 8
data_parallel_replicate_degree = 1    # native FSDP, single-node 8-GPU (shard 8 x replicate 1 = 8 ranks)

[model.activation_checkpointing]
mode           = "selective"
save_ops_regex = ["fmha"]

[model.tokenizer]
vae_path = "${oc.env:WAN_VAE_PATH}"

[dataloader_train]
max_samples_per_batch = 64      # 单卡每 micro-batch 64 个样本

[optimizer]
lr = 5.0e-05
optimizer_type = "AdamW"   # 原生 AdamW;FusedAdam 依赖 transformer_engine(CUDA-only),Ascend NPU 不可用
fused = true              # torch.optim.AdamW 的 fused=True 是 CUDA-only;NPU 走 foreach(默认,设备无关)

[scheduler]
cycle_lengths = [16000]
warm_up_steps = [500]

[trainer]
distributed_parallelism = "fsdp"
max_iter        = 2000
logging_iter    = 50
grad_accum_iter = 2       # global batch = max_samples 128 x (shard 8 x replicate 1) x 2 = 2048

[checkpoint]
load_path = "${oc.env:BASE_CHECKPOINT_PATH}"
save_iter = 500
